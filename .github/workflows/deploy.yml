name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        # Sets basePath to "/<repo>" so project-page asset URLs resolve.
        # AI_PROXY_URL (repo variable) points the terminal at the Worker; when
        # unset the terminal falls back to the in-browser model (WebLLM).
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_AI_PROXY_URL: ${{ vars.AI_PROXY_URL }}

      # Publishes ./out to the gh-pages branch via git. This avoids the
      # Actions artifact storage quota used by the official Pages workflow.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
