name: Deploy AI Worker

# Disabled for now: runs only when triggered manually (Actions → Run workflow).
# To re-enable automatic deploys, restore the `push` trigger below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "worker/**"
  #     - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Expose the secret as a job env so steps can self-skip when it's missing,
    # keeping the run green until Cloudflare credentials are configured.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Check configuration
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping Worker deploy."
            echo "Add CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID and GROQ_API_KEY"
            echo "as repo secrets to enable this workflow."
          fi

      - uses: actions/checkout@v4
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}

      - uses: actions/setup-node@v4
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        with:
          node-version: 20

      # Deploys the Worker and sets the Groq key as a Worker secret from the
      # GitHub secret. The key is used only here (deploy time) and stored as a
      # Cloudflare Worker secret — it never reaches the static site/client.
      - name: Deploy Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npx --yes wrangler@3 deploy

      - name: Set Groq secret
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: echo "$GROQ_API_KEY" | npx --yes wrangler@3 secret put GROQ_API_KEY
